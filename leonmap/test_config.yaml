# Config override: include only what you want to change.
# All values below are the current defaults.

build:
  db_dir: "db"
  data_dir: "data"
  base_model_name: "cambridgeltl/SapBERT-from-PubMedBERT-fulltext"
  ft_model_path: "models/sap_FT"
  max_length: 512
  embed_batch_size: 64
  device: "auto"
  synonym_cap: 10
  faiss_fetch_k: 200
  lexical_min_cosine: 0.5
  threshold: 0.9
  monitor_samples: 3
  rebuild: false
  use_gilda: false
  log_dir: "logs"

collections:
  hp:
    source: owl
    model: ft
    owl_path: hp_enriched.owl
    id_prefixes: ["HP_"]
  mp:
    source: owl
    model: ft
    owl_path: mp_enriched.owl
    id_prefixes: ["MP_"]
  hp_base:
    source: owl
    model: base
    owl_path: hp_enriched.owl
    id_prefixes: ["HP_"]
  mp_base:
    source: owl
    model: base
    owl_path: mp_enriched.owl
    id_prefixes: ["MP_"]
  mondo:
    source: owl
    model: ft
    owl_path: mondo.owl
    id_prefixes: ["MONDO_"]
  mesh:
    source: owl
    model: ft
    owl_path: mesh_disease.owl
    id_prefixes: ["mesh_"]
  mondo_base:
    source: owl
    model: base
    owl_path: mondo.owl
    id_prefixes: ["MONDO_"]
  mesh_base:
    source: owl
    model: base
    owl_path: mesh_disease.owl
    id_prefixes: ["mesh_"]
  doid:
    source: owl
    model: ft
    owl_path: doid.owl
    id_prefixes: ["DOID_"]
  doid_base:
    source: owl
    model: base
    owl_path: doid.owl
    id_prefixes: ["DOID_"]
  mesh_full:
    source: owl
    model: ft
    owl_path: mesh.owl
    id_prefixes: ["mesh_"]
  mesh_full_base:
    source: owl
    model: base
    owl_path: mesh.owl
    id_prefixes: ["mesh_"]
  chebi:
    source: owl
    model: ft
    owl_path: chebi.owl
    id_prefixes: ["CHEBI_"]
  chebi_base:
    source: owl
    model: base
    owl_path: chebi.owl
    id_prefixes: ["CHEBI_"]

ablations:
  hp2mp:
    src_collection: hp
    tgt_collection: mp
    gold_file: hp_mp_gold.tsv
    src_col: src_id
    tgt_col: tgt_id
    ks: [1, 50, 100, 200]
    models: ["ft"]
    modes: ["full_src"]
    reverse: true
  mondo2mesh:
    src_collection: mondo
    tgt_collection: mesh
    gold_file: gilda_mondo_mesh_predictions.sssom.tsv
    src_col: subject_id
    tgt_col: object_id
    ks: [1, 50, 100, 200]
    models: ["base", "ft"]
    modes: ["full_src"]
    reverse: true
  mesh2mondo:
    src_collection: mesh
    tgt_collection: mondo
    gold_file: positive.sssom.tsv
    src_col: subject_id
    tgt_col: object_id
    ks: [1, 50, 100, 200]
    models: ["ft"]
    modes: ["full_src"]
    reverse: false
  mondo2doid:
    src_collection: mondo
    tgt_collection: doid
    gold_file: mondo_doid_gold.tsv
    src_col: subject_id
    tgt_col: object_id
    ks: [1, 50, 100, 200]
    models: ["base", "ft"]
    modes: ["label_only", "full_src"]
    reverse: true
  mesh_full2chebi:
    src_collection: mesh_full
    tgt_collection: chebi
    gold_file: positive.sssom.tsv
    src_col: subject_id
    tgt_col: object_id
    ks: [1, 50, 100, 200]
    models: ["ft"]
    modes: ["full_src"]
    reverse: false
  chebi2mesh_full:
    src_collection: chebi
    tgt_collection: mesh_full
    gold_file: positive.sssom.tsv
    src_col: subject_id
    tgt_col: object_id
    ks: [1, 50, 100, 200]
    models: ["ft"]
    modes: ["full_src"]
    reverse: false

mappings:
  hp_mp:
    src_collection: hp
    tgt_collection: mp
    gold_file: hp_mp_gold.tsv
    src_col: src_id
    tgt_col: tgt_id
    threshold: 1.0
    top_k: 1
    reverse: true
  mondo_mesh:
    src_collection: mondo
    tgt_collection: mesh
    gold_file: positive.sssom.tsv
    src_col: subject_id
    tgt_col: object_id
    threshold: 0.9
    top_k: 1
    reverse: false
  mesh_mondo:
    src_collection: mesh
    tgt_collection: mondo
    gold_file: positive.sssom.tsv
    src_col: subject_id
    tgt_col: object_id
    threshold: 0.9
    top_k: 1
    reverse: false
  chebi_mesh_full:
    src_collection: chebi
    tgt_collection: mesh_full
    gold_file: positive.sssom.tsv
    src_col: subject_id
    tgt_col: object_id
    threshold: 0.9
    top_k: 1
    reverse: false
  mesh_full_chebi:
    src_collection: mesh_full
    tgt_collection: chebi
    gold_file: positive.sssom.tsv
    src_col: subject_id
    tgt_col: object_id
    threshold: 0.9
    top_k: 1
    reverse: false
